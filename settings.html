<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Settings - T-rexo Admin</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
    <script src="global.js"></script>
</head>
<body>
    <div class="dashboard-layout">
        <!-- Sidebar Navigation -->
        <aside class="sidebar">
            <div class="sidebar-logo">T-rexo Admin</div>
            <nav class="sidebar-nav">
                <ul>
                    <li><a href="dashboard.html">Dashboard</a></li>
                    <li><a href="users.html">Users</a></li>
                    <li><a href="products.html">Products</a></li>
                    <li><a href="analytics.html">Analytics</a></li>
                    <li><a href="notifications.html">Notifications</a></li>
                    <li><a href="settings.html" class="active">Settings</a></li>
                </ul>
            </nav>
        </aside>

        <!-- Main Content Area -->
        <main class="main-content">
            <header class="dashboard-header">
                <h2>Settings</h2>
                <div class="user-info">
                    <span class="user-email-display">admin@example.com</span>
                    <button class="logout-btn">Logout</button>
                </div>
            </header>

            <div class="dashboard-body">
                
                <div class="settings-grid" style="display: grid; grid-template-columns: 1fr 1fr; gap: 40px; max-width: 900px;">
                    <!-- Profile Update -->
                    <div class="card">
                        <h3 style="margin-bottom: 20px;">Profile Settings</h3>
                        <form id="profileForm">
                            <div class="form-group">
                                <label>Name</label>
                                <input type="text" id="profileName" placeholder="Your Name" required>
                            </div>
                            <div class="form-group">
                                <label>Email</label>
                                <input type="email" id="profileEmail" required disabled title="Emails cannot be changed in this mock.">
                            </div>
                            <button type="submit" class="btn-primary">Save Profile</button>
                            <div id="profileFeedback" class="feedback-message"></div>
                        </form>
                    </div>

                    <!-- Password and Appearance -->
                    <div class="card">
                        <h3 style="margin-bottom: 20px;">Security & Appearance</h3>
                        
                        <form id="passwordForm">
                            <div class="form-group">
                                <label>New Password</label>
                                <input type="password" id="newPassword" minlength="6" required>
                            </div>
                            <button type="submit" class="btn-primary" style="margin-bottom: 30px;">Update Password</button>
                            <div id="passwordFeedback" class="feedback-message" style="margin-top: -15px; margin-bottom: 20px;"></div>
                        </form>

                        <hr style="border: 0; border-top: 1px solid rgba(255,255,255,0.1); margin-bottom: 20px;">

                        <div style="display: flex; justify-content: space-between; align-items: center;">
                            <div>
                                <h4 style="margin-bottom: 6px;">Dark Mode</h4>
                                <p style="font-size: 13px; color: #888;">Toggle the appearance of the dashboard.</p>
                            </div>
                            <button id="themeToggleBtn" class="btn-secondary">Switch to Light Theme</button>
                        </div>
                    </div>
                </div>

            </div>
        </main>
    </div>

    <script src="settings.js"></script>
</body>
</html>
