<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Products - T-rexo Admin</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
    <script src="global.js"></script>
    <style>
        .product-img {
            width: 40px;
            height: 40px;
            border-radius: 8px;
            background: rgba(255, 255, 255, 0.1);
            object-fit: cover;
        }
    </style>
</head>
<body>
    <div class="dashboard-layout">
        <!-- Sidebar Navigation -->
        <aside class="sidebar">
            <div class="sidebar-logo">T-rexo Admin</div>
            <nav class="sidebar-nav">
                <ul>
                    <li><a href="dashboard.html">Dashboard</a></li>
                    <li><a href="users.html">Users</a></li>
                    <li><a href="products.html" class="active">Products</a></li>
                    <li><a href="analytics.html">Analytics</a></li>
                    <li><a href="notifications.html">Notifications</a></li>
                    <li><a href="settings.html">Settings</a></li>
                </ul>
            </nav>
        </aside>

        <!-- Main Content Area -->
        <main class="main-content">
            <header class="dashboard-header">
                <h2>Products Management</h2>
                <div class="user-info">
                    <span class="user-email-display">admin@example.com</span>
                    <button class="logout-btn">Logout</button>
                </div>
            </header>

            <div class="dashboard-body">
                <div class="page-actions">
                    <div style="display:flex; gap: 12px;">
                        <input type="text" id="searchInput" class="search-input" style="width:200px" placeholder="Search product...">
                        <select id="sortSelect" class="search-input">
                            <option value="none">Sort by</option>
                            <option value="priceAsc">Price (Low to High)</option>
                            <option value="priceDesc">Price (High to Low)</option>
                            <option value="qtyAsc">Quantity (Low to High)</option>
                        </select>
                    </div>
                    <button class="btn-primary" id="addProductBtn">Add Product</button>
                </div>

                <div class="table-container">
                    <table class="admin-table">
                        <thead>
                            <tr>
                                <th>Picture</th>
                                <th>Name</th>
                                <th>Price</th>
                                <th>Quantity</th>
                                <th>Status</th>
                                <th>Actions</th>
                            </tr>
                        </thead>
                        <tbody id="productsTableBody">
                            <!-- Injected by JS -->
                        </tbody>
                    </table>
                </div>
            </div>
        </main>
    </div>

    <!-- Add/Edit Product Modal -->
    <div id="productModal" class="modal">
        <div class="modal-content">
            <h3 id="modalTitle">Add Product</h3>
            <form id="productForm">
                <input type="hidden" id="productId">
                <div class="form-group">
                    <label>Name</label>
                    <input type="text" id="productName" required>
                </div>
                <div class="form-group">
                    <label>Price</label>
                    <input type="number" step="0.01" id="productPrice" required>
                </div>
                <div class="form-group">
                    <label>Quantity</label>
                    <input type="number" id="productQty" required>
                </div>
                <div class="form-group">
                    <label>Picture URL</label>
                    <input type="url" id="productPic" placeholder="https://..." required>
                </div>
                <div class="form-group">
                    <label>Status</label>
                    <select id="productStatus" class="search-input" style="width:100%" required>
                        <option value="In Stock">In Stock</option>
                        <option value="Out of Stock">Out of Stock</option>
                    </select>
                </div>
                <div class="modal-actions">
                    <button type="button" class="btn-secondary" id="closeModalBtn">Cancel</button>
                    <button type="submit" class="btn-primary">Save Product</button>
                </div>
            </form>
        </div>
    </div>

    <script src="products.js"></script>
</body>
</html>
